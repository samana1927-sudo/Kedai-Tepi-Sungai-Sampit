<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kedai Tepi Sungai Sampit- Registrasi POS KASIR</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Delius&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="registrasi.css">
</head>
<body>

    <div class="bg-decorations"></div>

    <div class="register-card">
        
        <svg class="brush-top" viewBox="0 0 100 100" preserveAspectRatio="none">
            <path d="M0,0 Q30,5 40,25 T15,70 Q5,85 0,90 Z" fill="none" stroke="#287f9e" stroke-width="2" stroke-dasharray="2,3" opacity="0.4"/>
            <path d="M0,0 Q20,15 25,45 T5,80" fill="none" stroke="#287f9e" stroke-width="1.5" opacity="0.3"/>
        </svg>

        <div class="logo-area">
            <img src="logo.png" alt="Logo">
        </div>

        <div class="brand-title">Kedai Tepi Sungai Sampit</div>
        <div class="brand-subtitle">DAFTAR AKUN BARU</div>

        <form class="form-container" action="index.html" method="GET">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <div class="input-style">
                    <i class="fa-regular fa-id-card"></i>
                    <input type="text" placeholder="Masukkan nama lengkap" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <div class="input-style">
                    <i class="fa-regular fa-user"></i>
                    <input type="email" placeholder="Masukkan email" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password Baru</label>
                <div class="input-style">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Buat password baru" required>
                    <i class="fa-regular fa-eye eye-icon"></i>
                </div>
            </div>

            <button type="submit" class="btn-daftar">Daftar</button>
        </form>

        <div class="footer-link">
            Sudah Punya Akun? <a href="index.html">Masuk Disini</a>
        </div>

        <svg class="wave-bottom" viewBox="0 0 100 20" preserveAspectRatio="none">
            <path d="M0,15 Q25,5 50,13 T100,8 L100,20 L0,20 Z" fill="#4faec2" opacity="0.4"/>
            <path d="M0,12 Q30,18 60,10 T100,14 L100,20 L0,20 Z" fill="#29839f" opacity="0.8"/>
            <circle cx="89" cy="5" r="1.2" fill="#fff" opacity="0.7" />
            <circle cx="96" cy="6" r="0.9" fill="#fff" opacity="0.8" />
        </svg>

    </div>

</body>
</html>
